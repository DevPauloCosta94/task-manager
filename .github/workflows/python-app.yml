name: Python application

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-build-test-sast:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir -r requirements.txt

    - name: Run Python syntax check
      run: python -m py_compile todo_project/run.py

    - name: Run unit tests
      run: python -m unittest discover -s todo_project -p 'test_*.py'

    - name: Install Bandit
      run: pip install --no-cache-dir bandit

    - name: Run Bandit SAST
      run: bandit -r todo_project

    - name: Start Flask app for OWASP ZAP scan
      run: |
        nohup python todo_project/run.py > flask.log 2>&1 &
        sleep 12
        curl -fsS http://127.0.0.1:5000/

    - name: Run OWASP ZAP baseline scan
      uses: zaproxy/action-baseline@v0.15.0
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        target: 'http://host.docker.internal:5000'
        docker_name: 'ghcr.io/zaproxy/zaproxy:stable'
        fail_action: 'true'
        artifact_name: 'zap_scan'

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: todo_project/Dockerfile
        push: false
        tags: task-manager-app:latest
